name: Release Build

# Pipeline única de release: calcula a versão (sem criar nada), roda os gates,
# builda os artefatos e — só se tudo passar — cria a tag anotada e publica a
# GitHub Release. A lógica de versão/tag/notas vem das composite actions
# compartilhadas em ghpm99/ghpm99 (@v2); aqui só orquestramos a ordem
# versão → build → tag → release, sem rodar nada duas vezes.

on:
  push:
    branches:
      - main

concurrency:
  group: release-main
  cancel-in-progress: false

permissions:
  contents: write

env:
  GO_VERSION: '1.24'
  NODE_VERSION: '20'
  BUILD_DIR: build
  FRONTEND_DIR: frontend
  BACKEND_DIR: backend
  DIST_DIR: frontend/dist
  BACKEND_COVERAGE_MIN: '80'

jobs:
  version:
    name: Resolve next version
    runs-on: ubuntu-latest
    outputs:
      released: ${{ steps.ver.outputs.released }}
      tag: ${{ steps.ver.outputs.tag }}
      last_tag: ${{ steps.ver.outputs.last-tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: ver
        uses: ghpm99/ghpm99/.github/actions/calcular-versao@v2
        with:
          version-scheme: calver4

  lint-frontend:
    name: Lint Frontend
    runs-on: ubuntu-latest
    needs: version
    if: needs.version.outputs.released == 'true'
    defaults:
      run:
        working-directory: ${{ env.FRONTEND_DIR }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: yarn
          cache-dependency-path: frontend/yarn.lock
      - run: yarn install --frozen-lockfile
      - run: yarn lint

  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    needs: lint-frontend
    defaults:
      run:
        working-directory: ${{ env.FRONTEND_DIR }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: yarn
          cache-dependency-path: frontend/yarn.lock
      - run: yarn install --frozen-lockfile
      - run: yarn test --coverage --watchAll=false
      - run: yarn build

  lint-backend:
    name: Lint Backend
    runs-on: ubuntu-latest
    needs: version
    if: needs.version.outputs.released == 'true'
    defaults:
      run:
        working-directory: ${{ env.BACKEND_DIR }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - run: test -z "$(gofmt -l .)"
      - run: go vet ./...

  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    needs: lint-backend
    defaults:
      run:
        working-directory: ${{ env.BACKEND_DIR }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Run backend tests with coverage profile
        run: go test ./... -coverprofile=coverage.out
      - name: Enforce backend coverage threshold
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | awk '/^total:/ {gsub("%", "", $3); print $3}')
          echo "Backend coverage: ${COVERAGE}%"
          awk -v c="$COVERAGE" -v min="${BACKEND_COVERAGE_MIN}" 'BEGIN { exit(c >= min ? 0 : 1) }'

  build-downloads:
    name: Build client apps (Android + plugin)
    runs-on: ubuntu-latest
    needs: [version, test-backend, test-frontend]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Build client apps and manifest
        # Every client app rides the product's global tag, so the version shown
        # on /downloads matches the running backend. GRADLE_VARIANT defaults to
        # debug (installable without a keystore); switch once signing exists.
        env:
          TAG: ${{ needs.version.outputs.tag }}
        run: |
          VERSION="${TAG#v}"
          ANDROID_VERSION="$VERSION" \
          MOBILE_VERSION="$VERSION" \
          PLUGIN_VERSION="$VERSION" \
            bash scripts/build-downloads.sh

      - name: Upload client apps bundle
        uses: actions/upload-artifact@v4
        with:
          name: downloads
          path: downloads

  build-linux:
    name: Build on Linux
    runs-on: ubuntu-latest
    needs: [version, test-backend, test-frontend, build-downloads]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download client apps bundle
        uses: actions/download-artifact@v4
        with:
          name: downloads
          path: downloads

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: yarn
          cache-dependency-path: frontend/yarn.lock

      - name: Install frontend dependencies
        working-directory: ${{ env.FRONTEND_DIR }}
        run: yarn install --frozen-lockfile

      - name: Build frontend
        working-directory: ${{ env.FRONTEND_DIR }}
        env:
          VITE_API_URL: ''
        run: yarn build

      - name: Build Go backend (Linux)
        working-directory: ${{ env.BACKEND_DIR }}
        env:
          CGO_ENABLED: 1
          GOOS: linux
          GOARCH: amd64
        run: |
          go build -ldflags "-X 'nas-go/api/api.Version=${{ needs.version.outputs.tag }}' -X 'nas-go/api/api.CommitHash=${{ github.sha }}' -X 'nas-go/api/api.GoVersion=${{ env.GO_VERSION }}' -X 'nas-go/api/api.NodeVersion=${{ env.NODE_VERSION }}'" -tags=linux -o kuranas ./cmd/nas/main.go

      - name: Prepare build directory
        run: |
          mkdir -p $BUILD_DIR/dist
          cp -r $DIST_DIR $BUILD_DIR/
          cp $BACKEND_DIR/kuranas $BUILD_DIR/
          cp -r $BACKEND_DIR/icons $BUILD_DIR/
          cp -r $BACKEND_DIR/translations $BUILD_DIR/
          cp -r $BACKEND_DIR/scripts $BUILD_DIR/
          cp -r downloads $BUILD_DIR/

      - name: Archive build (Linux)
        run: zip -r kuranas-linux.zip $BUILD_DIR

      - name: Upload artifact (Linux)
        uses: actions/upload-artifact@v4
        with:
          name: kuranas-linux
          path: kuranas-linux.zip

  build-windows:
    name: Build on Windows
    runs-on: windows-latest
    needs: [version, test-backend, test-frontend, build-downloads]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download client apps bundle
        uses: actions/download-artifact@v4
        with:
          name: downloads
          path: downloads

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: yarn
          cache-dependency-path: frontend/yarn.lock

      - name: Install frontend dependencies
        working-directory: frontend
        run: yarn install --frozen-lockfile

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_URL: ''
        run: yarn build

      - name: Build Go backend (Windows)
        working-directory: backend
        env:
          CGO_ENABLED: 1
          GOOS: windows
          GOARCH: amd64
        run: go build -ldflags "-X 'nas-go/api/api.Version=${{ needs.version.outputs.tag }}' -X 'nas-go/api/api.CommitHash=${{ github.sha }}' -X 'nas-go/api/api.GoVersion=${{ env.GO_VERSION }}' -X 'nas-go/api/api.NodeVersion=${{ env.NODE_VERSION }}'" -tags=windows -o kuranas.exe ./cmd/nas

      - name: Prepare build directory
        shell: bash
        run: |
          mkdir -p $BUILD_DIR/dist
          cp -r $DIST_DIR $BUILD_DIR/
          cp backend/kuranas.exe $BUILD_DIR/
          cp -r backend/icons $BUILD_DIR/
          cp -r backend/translations $BUILD_DIR/
          cp -r backend/scripts $BUILD_DIR/
          cp -r downloads $BUILD_DIR/

      - name: Archive build (Windows)
        run: Compress-Archive -Path $env:BUILD_DIR\* -DestinationPath kuranas-windows.zip

      - name: Upload artifact (Windows)
        uses: actions/upload-artifact@v4
        with:
          name: kuranas-windows
          path: kuranas-windows.zip

  release:
    name: Release build artifacts
    needs: [version, build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (histórico p/ notas)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: kuranas-*
          merge-multiple: true

      - name: Criar e empurrar a tag
        uses: ghpm99/ghpm99/.github/actions/criar-tag@v2
        with:
          tag: ${{ needs.version.outputs.tag }}

      - name: Gerar notas da release
        id: notes
        uses: ghpm99/ghpm99/.github/actions/gerar-notas@v2
        with:
          tag: ${{ needs.version.outputs.tag }}
          last-tag: ${{ needs.version.outputs.last_tag }}

      - name: Criar GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: ${{ needs.version.outputs.tag }}
          body_path: ${{ steps.notes.outputs.notes-path }}
          files: |
            kuranas-linux.zip
            kuranas-windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
