name: Release Build

on:
  workflow_run:
    workflows:
      - Auto Tag Main
    types:
      - completed
    branches:
      - main

permissions:
  contents: write

env:
  GO_VERSION: '1.24'
  NODE_VERSION: '20'
  BUILD_DIR: build
  FRONTEND_DIR: frontend
  BACKEND_DIR: backend
  DIST_DIR: frontend/dist
  BACKEND_COVERAGE_MIN: '80'

jobs:
  resolve-tag:
    name: Resolve tag from auto-tag workflow
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.resolve.outputs.tag_name }}
      commit_sha: ${{ steps.resolve.outputs.commit_sha }}
    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve semantic tag on workflow commit
        id: resolve
        shell: bash
        run: |
          TARGET_SHA="${{ github.event.workflow_run.head_sha }}"
          git fetch --force --tags

          TAGS=$(git tag --points-at "$TARGET_SHA" | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' || true)
          if [ -z "$TAGS" ]; then
            echo "No semantic tag found on commit $TARGET_SHA."
            exit 1
          fi

          TAG_NAME=$(printf '%s\n' "$TAGS" | sort -V | tail -n 1)
          echo "Resolved tag: $TAG_NAME for commit: $TARGET_SHA"
          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"
          echo "commit_sha=$TARGET_SHA" >> "$GITHUB_OUTPUT"

  lint-frontend:
    name: Lint Frontend
    runs-on: ubuntu-latest
    needs: resolve-tag
    defaults:
      run:
        working-directory: ${{ env.FRONTEND_DIR }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-tag.outputs.commit_sha }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: yarn
          cache-dependency-path: frontend/yarn.lock
      - run: yarn install --frozen-lockfile
      - run: yarn lint

  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    needs: [resolve-tag, lint-frontend]
    defaults:
      run:
        working-directory: ${{ env.FRONTEND_DIR }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-tag.outputs.commit_sha }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: yarn
          cache-dependency-path: frontend/yarn.lock
      - run: yarn install --frozen-lockfile
      - run: yarn test --coverage --watchAll=false
      - run: yarn build

  lint-backend:
    name: Lint Backend
    runs-on: ubuntu-latest
    needs: resolve-tag
    defaults:
      run:
        working-directory: ${{ env.BACKEND_DIR }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-tag.outputs.commit_sha }}
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - run: test -z "$(gofmt -l .)"
      - run: go vet ./...

  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    needs: [resolve-tag, lint-backend]
    defaults:
      run:
        working-directory: ${{ env.BACKEND_DIR }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-tag.outputs.commit_sha }}
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Run backend tests with coverage profile
        run: go test ./... -coverprofile=coverage.out
      - name: Enforce backend coverage threshold
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | awk '/^total:/ {gsub("%", "", $3); print $3}')
          echo "Backend coverage: ${COVERAGE}%"
          awk -v c="$COVERAGE" -v min="${BACKEND_COVERAGE_MIN}" 'BEGIN { exit(c >= min ? 0 : 1) }'

  build-linux:
    name: Build on Linux
    runs-on: ubuntu-latest
    needs: [resolve-tag, test-backend, test-frontend]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-tag.outputs.commit_sha }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: yarn
          cache-dependency-path: frontend/yarn.lock

      - name: Install frontend dependencies
        working-directory: ${{ env.FRONTEND_DIR }}
        run: yarn install --frozen-lockfile

      - name: Build frontend
        working-directory: ${{ env.FRONTEND_DIR }}
        env:
          VITE_API_URL: ''
        run: yarn build

      - name: Build Go backend (Linux)
        working-directory: ${{ env.BACKEND_DIR }}
        env:
          CGO_ENABLED: 1
          GOOS: linux
          GOARCH: amd64
        run: |
          go build -ldflags "-X 'nas-go/api/api.Version=${{ needs.resolve-tag.outputs.tag_name }}' -X 'nas-go/api/api.CommitHash=${{ needs.resolve-tag.outputs.commit_sha }}' -X 'nas-go/api/api.GoVersion=${{ env.GO_VERSION }}' -X 'nas-go/api/api.NodeVersion=${{ env.NODE_VERSION }}'" -tags=linux -o kuranas ./cmd/nas/main.go

      - name: Prepare build directory
        run: |
          mkdir -p $BUILD_DIR/dist
          cp -r $DIST_DIR $BUILD_DIR/
          cp $BACKEND_DIR/kuranas $BUILD_DIR/
          cp -r $BACKEND_DIR/icons $BUILD_DIR/
          cp -r $BACKEND_DIR/translations $BUILD_DIR/
          cp -r $BACKEND_DIR/scripts $BUILD_DIR/

      - name: Archive build (Linux)
        run: zip -r kuranas-linux.zip $BUILD_DIR

      - name: Upload artifact (Linux)
        uses: actions/upload-artifact@v4
        with:
          name: kuranas-linux
          path: kuranas-linux.zip

  build-windows:
    name: Build on Windows
    runs-on: windows-latest
    needs: [resolve-tag, test-backend, test-frontend]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-tag.outputs.commit_sha }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: yarn
          cache-dependency-path: frontend/yarn.lock

      - name: Install frontend dependencies
        working-directory: frontend
        run: yarn install --frozen-lockfile

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_URL: ''
        run: yarn build

      - name: Build Go backend (Windows)
        working-directory: backend
        env:
          CGO_ENABLED: 1
          GOOS: windows
          GOARCH: amd64
        run: go build -ldflags "-X 'nas-go/api/api.Version=${{ needs.resolve-tag.outputs.tag_name }}' -X 'nas-go/api/api.CommitHash=${{ needs.resolve-tag.outputs.commit_sha }}' -X 'nas-go/api/api.GoVersion=${{ env.GO_VERSION }}' -X 'nas-go/api/api.NodeVersion=${{ env.NODE_VERSION }}'" -tags=windows -o kuranas.exe ./cmd/nas

      - name: Prepare build directory
        shell: bash
        run: |
          mkdir -p $BUILD_DIR/dist
          cp -r $DIST_DIR $BUILD_DIR/
          cp backend/kuranas.exe $BUILD_DIR/
          cp -r backend/icons $BUILD_DIR/
          cp -r backend/translations $BUILD_DIR/
          cp -r backend/scripts $BUILD_DIR/

      - name: Archive build (Windows)
        run: Compress-Archive -Path $env:BUILD_DIR\* -DestinationPath kuranas-windows.zip

      - name: Upload artifact (Windows)
        uses: actions/upload-artifact@v4
        with:
          name: kuranas-windows
          path: kuranas-windows.zip

  release:
    name: Release build artifacts
    needs: [resolve-tag, build-linux, build-windows]
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: kuranas-*
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ needs.resolve-tag.outputs.tag_name }}
          tag_name: ${{ needs.resolve-tag.outputs.tag_name }}
          files: |
            kuranas-linux.zip
            kuranas-windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
