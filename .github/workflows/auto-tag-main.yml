name: Auto Tag Main

# Mantém este NOME ("Auto Tag Main"): o build.yml dispara via workflow_run nele.
# Só cria a tag (calver4); a release com artefatos é feita pelo build.yml.

on:
  push:
    branches: [main]

concurrency:
  group: auto-tag-main
  cancel-in-progress: false

jobs:
  tag:
    permissions:
      contents: write
    uses: ghpm99/ghpm99/.github/workflows/auto-tag.yml@v1
    with:
      version-scheme: calver4
      create-release: false
